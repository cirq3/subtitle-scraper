name: Scrape Sinhala Subtitles

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      movie_title:
        description: 'Movie title to search'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Chromium
        run: sudo apt-get update && sudo apt-get install -y chromium-browser
      
      - name: Run scraper
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          MOVIE_TITLE: ${{ github.event.inputs.movie_title }}
        run: |
          if [ -n "$MOVIE_TITLE" ]; then
            node scraper.js "$MOVIE_TITLE"
          else
            node scrape-popular.js
          fi
      
      - name: Commit results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/subtitles.json
          git diff --staged --quiet || git commit -m "Update subtitles data [skip ci]"
          git push
