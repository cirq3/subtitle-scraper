name: Scrape Sinhala Subtitles

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger
    inputs:
      movie_title:
        description: 'Movie title to search'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Chromium
        run: sudo apt-get update && sudo apt-get install -y chromium-browser
      
      - name: Run scraper
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          MOVIE_TITLE: ${{ github.event.inputs.movie_title }}
        run: |
          if [ -n "$MOVIE_TITLE" ]; then
            node scraper.js "$MOVIE_TITLE"
          else
            node scrape-popular.js
          fi
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: subtitle-results
          path: public/subtitles.json
          retention-days: 7
